{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Confirm Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            carrot: "#FF6B35",
            dark: "#0f1419",
            card: "#1e2832"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-dark via-slate-900 to-blue-900 text-white min-h-screen">
  <!-- Header -->
  <header class="bg-card/90 backdrop-blur-lg border-b border-gray-700 p-4 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold text-carrot">Confirm Payment</h1>
      <a href="{% url 'wallet' %}"
         class="px-4 py-2 rounded-xl bg-carrot hover:bg-orange-600 transition">
        ← Back
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-3xl mx-auto p-6">
    <div class="bg-card/80 backdrop-blur-lg p-6 rounded-2xl shadow-md border border-gray-700 hover:border-carrot transition">
      <h2 class="text-xl font-semibold mb-4">Pay for Booking #{{ booking.id }}</h2>
      <p class="text-gray-300"><strong>Ride:</strong> {{ booking.ride }}</p>
      <p class="text-gray-300"><strong>Your Share:</strong> <span class="text-carrot">₹{{ amount_due|floatformat:2 }}</span></p>
      <p class="text-gray-300"><strong>Wallet Balance:</strong> ₹{{ wallet.balance|floatformat:2 }}</p>

      <div class="mt-6 flex gap-4">
        <!-- Pay Form -->
        <form method="post" action="{% url 'wallet_pay' booking.id %}">
          {% csrf_token %}
          <button type="submit"
                  class="px-6 py-2 bg-carrot hover:bg-orange-600 rounded-xl font-semibold shadow transition">
            ✅ Pay Now
          </button>
        </form>

        <!-- Cancel Button -->
        <a href="{% url 'wallet' %}"
           class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-xl font-semibold shadow transition">
          ✖ Cancel
        </a>
      </div>
    </div>
  </main>
</body>
</html>
