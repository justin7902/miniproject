{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-orange-400 mb-6 text-center">Reset Password</h1>
        <form method="post">
            {% csrf_token %}
            <label class="block text-white font-semibold mb-2">New Password</label>
            <input type="password" name="new_password" required class="w-full p-2 rounded-lg bg-gray-900 text-white mb-4 border border-gray-700">
            <label class="block text-white font-semibold mb-2">Confirm Password</label>
            <input type="password" name="confirm_password" required class="w-full p-2 rounded-lg bg-gray-900 text-white mb-4 border border-gray-700">
            <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 p-3 rounded-lg font-bold text-white">Reset Password</button>
        </form>
    </div>
</body>
</html>
