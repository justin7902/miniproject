<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RideShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        .floating-animation {
            animation: float 10s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        
        .pulse-animation {
            animation: pulse 5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        
        .form-container {
            backdrop-filter: blur(15px);
            background: rgba(31, 41, 55, 0.85);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }
        
        .register-btn {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            transition: all 0.3s ease;
        }
        
        .register-btn:hover {
            background: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(249, 115, 22, 0.4);
        }
        
        .hexagon-animation {
            animation: hexFloat 12s ease-in-out infinite;
        }
        
        @keyframes hexFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(120deg); }
            66% { transform: translateY(-10px) rotate(240deg); }
        }
        
        .connecting-line {
            animation: lineGlow 8s ease-in-out infinite;
        }
        
        @keyframes lineGlow {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
        
        .file-upload-area {
            border: 2px dashed #6b7280;
            transition: all 0.3s ease;
        }
        
        .file-upload-area:hover {
            border-color: #f97316;
            background-color: rgba(249, 115, 22, 0.05);
        }
        
        .radio-option {
            transition: all 0.2s ease;
        }
        
        .radio-option:hover {
            background-color: rgba(249, 115, 22, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gray-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <svg class="h-8 w-8 text-orange-500 mr-2" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11C5.84 5 5.28 5.42 5.08 6.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                        </svg>
                        <span class="text-2xl font-bold text-white">RideShare</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="{% url 'login' %}" class="text-gray-300 hover:text-orange-500 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                        Sign In
                    </a>
                    <a href="{% url 'index' %}" class="flex items-center text-gray-300 hover:text-orange-500 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 7v4H5.83l3.58-3.59L8 6l-6 6 6 6 1.41-1.41L5.83 13H21V7z"/>
                        </svg>
                        Return to Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="gradient-bg min-h-screen py-12 relative overflow-hidden">
        <!-- Background Graphics -->
        <div class="absolute inset-0">
            <!-- Hexagonal shapes -->
            <div class="absolute top-20 left-16 w-20 h-20 opacity-10 hexagon-animation" style="background: linear-gradient(45deg, #f97316, #ea580c); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation-delay: -1s;"></div>
            <div class="absolute top-40 right-24 w-16 h-16 opacity-15 hexagon-animation" style="background: linear-gradient(45deg, #fb923c, #f97316); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation-delay: -3s;"></div>
            <div class="absolute bottom-40 left-1/4 w-24 h-24 opacity-8 hexagon-animation" style="background: linear-gradient(45deg, #fdba74, #fb923c); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation-delay: -5s;"></div>
            <div class="absolute bottom-32 right-1/3 w-18 h-18 opacity-12 hexagon-animation" style="background: linear-gradient(45deg, #fed7aa, #fdba74); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation-delay: -2s;"></div>
            
            <!-- Connecting lines -->
            <svg class="absolute top-1/4 left-1/4 w-32 h-32 text-orange-500 opacity-20 connecting-line" viewBox="0 0 100 100" style="animation-delay: -1s;">
                <path d="M10 10 Q50 30 90 10 Q70 50 90 90 Q50 70 10 90 Q30 50 10 10" stroke="currentColor" stroke-width="1" fill="none"/>
            </svg>
            
            <svg class="absolute bottom-1/3 right-1/4 w-28 h-28 text-orange-400 opacity-15 connecting-line" viewBox="0 0 100 100" style="animation-delay: -3s;">
                <path d="M20 20 L80 20 L80 80 L20 80 Z M40 40 L60 40 L60 60 L40 60 Z" stroke="currentColor" stroke-width="1" fill="none"/>
            </svg>
            
            <!-- Network dots -->
            <div class="absolute top-1/3 left-1/3 w-3 h-3 bg-orange-500 rounded-full pulse-animation"></div>
            <div class="absolute top-2/3 right-1/4 w-2 h-2 bg-orange-400 rounded-full pulse-animation" style="animation-delay: -2s;"></div>
            <div class="absolute bottom-1/4 left-1/2 w-4 h-4 bg-orange-600 rounded-full pulse-animation" style="animation-delay: -4s;"></div>
            <div class="absolute top-1/2 right-1/3 w-2 h-2 bg-orange-300 rounded-full pulse-animation" style="animation-delay: -1s;"></div>
        </div>

        <!-- Registration Form Container -->
        <div class="relative z-10 max-w-4xl mx-auto px-4">
            <div class="form-container rounded-3xl shadow-2xl p-8 md:p-12">
                <!-- Header -->
                <div class="text-center mb-10">
                    <div class="flex items-center justify-center mb-6">
                        <svg class="h-16 w-16 text-orange-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11C5.84 5 5.28 5.42 5.08 6.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                        </svg>
                    </div>
                    <h2 class="text-4xl font-bold text-white mb-3">Join RideShare</h2>
                    <p class="text-gray-400 text-lg">Create your account and start sharing rides today</p>
                </div>

                <!-- Registration Form -->
                <form action="{% url 'register' %}" method="POST" enctype="multipart/form-data" class="space-y-8">
                    {% csrf_token %}
                    
                    <!-- Profile Image Upload -->
                    <!-- <div class="text-center">
                        <label class="block text-sm font-medium text-gray-300 mb-4">Profile Picture (Optional)</label>
                        <div class="file-upload-area rounded-xl p-6 text-center">
                            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <input type="file" name="profile_image" accept="image/*" class="hidden" id="profile-upload">
                            <label for="profile-upload" class="cursor-pointer">
                                <span class="text-orange-400 hover:text-orange-300 font-medium">Click to upload</span>
                                <span class="text-gray-400"> or drag and drop</span>
                            </label>
                            <p class="text-xs text-gray-500 mt-2">PNG, JPG, GIF up to 10MB</p>
                        </div>
                    </div> -->

                    <!-- Personal Information - Two Column Layout -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- First Name -->
                        <div>
                            <label for="first_name" class="block text-sm font-medium text-gray-300 mb-2">
                                First Name *
                            </label>
                            <input
                                id="first_name"
                                name="first_name"
                                type="text"
                                required
                                class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                placeholder="Enter your first name"
                            />
                        </div>

                        <!-- Last Name -->
                        <div>
                            <label for="last_name" class="block text-sm font-medium text-gray-300 mb-2">
                                Last Name *
                            </label>
                            <input
                                id="last_name"
                                name="last_name"
                                type="text"
                                required
                                class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                placeholder="Enter your last name"
                            />
                        </div>
                    </div>

                    <!-- Gender Selection -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-4">Gender *</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <label class="radio-option flex items-center p-4 border border-gray-600 rounded-lg cursor-pointer">
                                <input type="radio" name="gender" value="male" required class="text-orange-500 focus:ring-orange-500 focus:ring-2">
                                <span class="ml-3 text-white">Male</span>
                            </label>
                            <label class="radio-option flex items-center p-4 border border-gray-600 rounded-lg cursor-pointer">
                                <input type="radio" name="gender" value="female" required class="text-orange-500 focus:ring-orange-500 focus:ring-2">
                                <span class="ml-3 text-white">Female</span>
                            </label>
                            <label class="radio-option flex items-center p-4 border border-gray-600 rounded-lg cursor-pointer">
                                <input type="radio" name="gender" value="other" required class="text-orange-500 focus:ring-orange-500 focus:ring-2">
                                <span class="ml-3 text-white">Other</span>
                            </label>
                        </div>
                    </div>

                    <!-- Contact Information -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Phone Number -->
                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-300 mb-2">
                                Phone Number *
                            </label>
                            <input
                                id="phone"
                                name="phone"
                                type="tel"
                                required
                                class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                placeholder="+1 (555) 123-4567"
                            />
                        </div>

                        <!-- Email Address -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                                Email Address *
                            </label>
                            <input
                                id="email"
                                name="email"
                                type="email"
                                required
                                class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                placeholder="your.email@example.com"
                            />
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label for="address" class="block text-sm font-medium text-gray-300 mb-2">
                            Address *
                        </label>
                        <textarea
                            id="address"
                            name="address"
                            rows="3"
                            required
                            class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent resize-none"
                            placeholder="Enter your full address"
                        ></textarea>
                    </div>

                    <!-- Account Information -->
                    <div class="border-t border-gray-600 pt-8">
                        <h3 class="text-xl font-semibold text-white mb-6">Account Information</h3>
                        
                        <!-- Username -->
                        <div class="mb-6">
                            <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                                Username *
                            </label>
                            <input
                                id="username"
                                name="username"
                                type="text"
                                required
                                class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                placeholder="Choose a unique username"
                            />
                        </div>

                        <!-- Password Fields -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Password -->
                            <div>
                                <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                                    Password *
                                </label>
                                <input
                                    id="password1"
                                    name="password1"
                                    type="password"
                                    required
                                    class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                    placeholder="Create a strong password"
                                />
                            </div>

                            <!-- Confirm Password -->
                            <div>
                                <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-2">
                                    Confirm Password *
                                </label>
                                <input
                                    id="password1"
                                    name="password2"
                                    type="password"
                                    required
                                    class="input-field block w-full px-4 py-3 border border-gray-600 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                    placeholder="Confirm your password"
                                />
                            </div>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <!-- <div class="flex items-start">
                        <input
                            id="terms"
                            name="terms"
                            type="checkbox"
                            required
                            class="mt-1 text-orange-500 focus:ring-orange-500 focus:ring-2 rounded"
                        />
                        <label for="terms" class="ml-3 text-sm text-gray-300">
                            I agree to the 
                            <a href="#terms" class="text-orange-400 hover:text-orange-300 transition-colors">Terms of Service</a>
                            and 
                            <a href="#privacy" class="text-orange-400 hover:text-orange-300 transition-colors">Privacy Policy</a>
                        </label>
                    </div> -->

                    <!-- Register Button -->
                    <div class="pt-4">
                        <button
                            type="submit"
                            class="register-btn w-full flex justify-center py-4 px-6 border border-transparent rounded-lg shadow-sm text-lg font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500"
                        >
                            <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H5C3.89 1 3 1.89 3 3V21C3 22.11 3.89 23 5 23H19C20.11 23 21 22.11 21 21V9M19 9H14V4H19V9Z"/>
                            </svg>
                            Create Account
                        </button>
                    </div>
                </form>

                <!-- Sign In Link -->
                <div class="mt-8 text-center">
                    <p class="text-sm text-gray-400">
                        Already have an account?
                        <a href="{% url 'login' %}" class="font-medium text-orange-400 hover:text-orange-300 transition-colors ml-1">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

{% if messages %}
  <div class="messages">
    {% for message in messages %}
      <div class="alert 
        {% if message.tags %} alert-{{ message.tags }} {% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}

</body>
</html>
